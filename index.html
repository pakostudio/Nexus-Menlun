<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS V2 — Prospección Inteligente Menlun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f1ed 0%, #e8e5e0 100%);
      color: #2c2c2c;
      min-height: 100vh;
    }
    .header {
      background: white;
      border-bottom: 2px solid #1a3a52;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { color: #1a3a52; font-size: 24px; }
    .stats-box { background: #f5f1ed; padding: 8px 16px; border-radius: 6px; font-size: 13px; margin-right: 15px; }
    .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
    .toolbar {
      background: white;
      border: 1px solid #e8e5e0;
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 10px 14px; border: 1px solid #e8e5e0; border-radius: 6px; font-size: 14px; }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #1a3a52; color: white; }
    .btn-primary:hover { background: #0f2537; }
    .btn-secondary { background: #00bfff; color: #1a3a52; }
    .table-wrapper {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #1a3a52; color: white; }
    th { padding: 14px 16px; text-align: left; font-weight: 700; font-size: 13px; }
    td { padding: 12px 16px; border-bottom: 1px solid #e8e5e0; font-size: 13px; }
    tbody tr:hover { background: #f5f1ed; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #e8e5e0; padding-bottom: 15px; }
    .modal-header h2 { color: #1a3a52; font-size: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #2c2c2c; font-size: 13px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #e8e5e0; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .pipeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
    .pipeline-card { background: white; border-radius: 8px; padding: 15px; border-left: 4px solid #00bfff; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .pipeline-card h3 { color: #1a3a52; font-size: 14px; margin-bottom: 8px; }
    .pipeline-card .count { font-size: 28px; font-weight: 700; color: #00bfff; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>NEXUS V2</h1>
    <p style="font-size: 12px; color: #7a7a7a;">Prospección Inteligente para Menlun</p>
  </div>
  <div style="display: flex; gap: 15px;">
    <div class="stats-box"><strong id="totalContacts">0</strong><br>Contactos</div>
    <div class="stats-box"><strong id="nuevos">0</strong><br>Nuevos</div>
    <div class="stats-box"><strong id="contactados">0</strong><br>Contactados</div>
  </div>
</div>

<div class="container">
  <div class="pipeline" id="pipeline"></div>
  
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Buscar empresa, contacto, email...">
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">+ Agregar Contacto</button>
    <button class="btn btn-secondary" onclick="exportCSV()">📥 Descargar CSV</button>
  </div>

  <div class="table-wrapper">
    <table id="contactsTable">
      <thead>
        <tr>
          <th>EMPRESA</th>
          <th>UBICACIÓN</th>
          <th>NOMBRE</th>
          <th>CARGO</th>
          <th>EMAIL</th>
          <th>TELÉFONO</th>
          <th>MAPS</th>
          <th>ESTATUS</th>
          <th>PRIORIDAD</th>
          <th>ACCIONES</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Agregar Contacto</h2>
      <button style="background: none; border: none; font-size: 24px; cursor: pointer;" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="saveContact(event)">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>Empresa *</label>
          <input type="text" id="empresa" required>
        </div>
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" id="ubicacion" placeholder="Ciudad, región">
        </div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="nombre">
        </div>
        <div class="form-group">
          <label>Cargo</label>
          <input type="text" id="cargo">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" id="telefono">
        </div>
      </div>
      <div class="form-group">
        <label>Estatus</label>
        <select id="estatus">
          <option>Nuevo</option>
          <option>Contactado</option>
          <option>En seguimiento</option>
          <option>Propuesta enviada</option>
          <option>Ganado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prioridad</label>
        <select id="prioridad">
          <option>Alta</option>
          <option>Media</option>
          <option>Baja</option>
        </select>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
        <button type="button" class="btn" onclick="closeModal()" style="background: #c9c5bd; color: #2c2c2c;">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
  let contacts = [];
  let editingId = null;
  let nextId = 1;

  const initialContacts = [
    { id: 1, empresa: 'SuKarne', ubicacion: 'Culiacán', nombre: 'Jose Roberto Salazar Renteria', cargo: 'Supervisor de Almacén', email: 'jose.renteria@sukarne.com', telefono: '', estatus: 'Nuevo', prioridad: 'Alta' },
    { id: 2, empresa: 'SuKarne', ubicacion: 'Culiacán', nombre: 'Director Operaciones', cargo: 'Director', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Alta' },
    { id: 3, empresa: 'Kekén', ubicacion: 'México', nombre: 'Ramon Gonzalez', cargo: 'Gerente de Calidad', email: 'r.gonzalez@keken.com.mx', telefono: '', estatus: 'Nuevo', prioridad: 'Alta' },
    { id: 4, empresa: 'Kekén', ubicacion: 'México', nombre: 'Dave Meel', cargo: 'Manager Operations', email: 'dave.meel@keken.com.mx', telefono: '', estatus: 'Nuevo', prioridad: 'Alta' },
    { id: 5, empresa: 'Nestlé', ubicacion: 'Coatepec', nombre: 'Gerente de Calidad', cargo: 'Gerente', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Media' },
    { id: 6, empresa: 'Bachoco', ubicacion: 'Múltiples', nombre: 'Gerente de Calidad', cargo: 'Gerente', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Alta' },
    { id: 7, empresa: 'IFF México', ubicacion: 'CDMX', nombre: 'Director Técnico', cargo: 'Director', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Media' },
    { id: 8, empresa: 'Yakult México', ubicacion: 'CDMX', nombre: 'Supervisor Calidad', cargo: 'Supervisor', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Baja' },
    { id: 9, empresa: 'Unilever', ubicacion: 'CDMX', nombre: 'Jefe de Procesos', cargo: 'Jefe', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Media' },
    { id: 10, empresa: 'Grupo Cuadritos', ubicacion: 'CDMX', nombre: 'Gerente de Operaciones', cargo: 'Gerente', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Baja' },
    { id: 11, empresa: 'Ovomex', ubicacion: 'México', nombre: 'Director de Calidad', cargo: 'Director', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Media' },
    { id: 12, empresa: 'Grupo La Florida', ubicacion: 'Veracruz', nombre: 'Jefe de Saneamiento', cargo: 'Jefe', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Baja' },
    { id: 13, empresa: 'Grupo Bal', ubicacion: 'CDMX', nombre: 'Director Comercial', cargo: 'Director', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Alta' },
    { id: 14, empresa: 'Citi México', ubicacion: 'CDMX', nombre: 'Manager Sponsorship', cargo: 'Manager', email: '', telefono: '', estatus: 'Nuevo', prioridad: 'Media' }
  ];

  function load() {
    const saved = localStorage.getItem('nexusContacts');
    contacts = saved ? JSON.parse(saved) : initialContacts;
    nextId = Math.max(...contacts.map(c => c.id), 0) + 1;
    renderTable();
    updateStats();
  }

  function save() {
    localStorage.setItem('nexusContacts', JSON.stringify(contacts));
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Agregar Contacto';
    document.getElementById('empresa').value = '';
    document.getElementById('ubicacion').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('cargo').value = '';
    document.getElementById('email').value = '';
    document.getElementById('telefono').value = '';
    document.getElementById('estatus').value = 'Nuevo';
    document.getElementById('prioridad').value = 'Alta';
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  function editContact(id) {
    editingId = id;
    const c = contacts.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = `Editar: ${c.empresa}`;
    document.getElementById('empresa').value = c.empresa;
    document.getElementById('ubicacion').value = c.ubicacion;
    document.getElementById('nombre').value = c.nombre;
    document.getElementById('cargo').value = c.cargo;
    document.getElementById('email').value = c.email;
    document.getElementById('telefono').value = c.telefono;
    document.getElementById('estatus').value = c.estatus;
    document.getElementById('prioridad').value = c.prioridad;
    document.getElementById('editModal').classList.add('active');
  }

  function saveContact(e) {
    e.preventDefault();
    const data = {
      id: editingId || nextId++,
      empresa: document.getElementById('empresa').value,
      ubicacion: document.getElementById('ubicacion').value,
      nombre: document.getElementById('nombre').value,
      cargo: document.getElementById('cargo').value,
      email: document.getElementById('email').value,
      telefono: document.getElementById('telefono').value,
      estatus: document.getElementById('estatus').value,
      prioridad: document.getElementById('prioridad').value
    };
    if (editingId) {
      const idx = contacts.findIndex(x => x.id === editingId);
      contacts[idx] = data;
    } else {
      contacts.push(data);
    }
    save();
    renderTable();
    updateStats();
    closeModal();
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = contacts.filter(c =>
      c.empresa.toLowerCase().includes(search) ||
      c.nombre.toLowerCase().includes(search) ||
      c.email.toLowerCase().includes(search)
    );

    const html = filtered.map(c => `
      <tr>
        <td><strong>${c.empresa}</strong></td>
        <td>${c.ubicacion}</td>
        <td>${c.nombre}</td>
        <td>${c.cargo}</td>
        <td>${c.email ? `<a href="mailto:${c.email}">${c.email}</a>` : '—'}</td>
        <td>${c.telefono || '—'}</td>
        <td>${c.ubicacion ? `<a href="https://www.google.com/maps/search/${encodeURIComponent(c.empresa + ' ' + c.ubicacion)}" target="_blank">📍</a>` : '—'}</td>
        <td>${c.estatus}</td>
        <td>${c.prioridad}</td>
        <td><button class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;" onclick="editContact(${c.id})">Editar</button></td>
      </tr>
    `).join('');
    document.getElementById('tableBody').innerHTML = html;
  }

  function updateStats() {
    document.getElementById('totalContacts').textContent = contacts.length;
    document.getElementById('nuevos').textContent = contacts.filter(c => c.estatus === 'Nuevo').length;
    document.getElementById('contactados').textContent = contacts.filter(c => c.estatus !== 'Nuevo').length;
    updatePipeline();
  }

  function updatePipeline() {
    const pipeline = {
      'Nuevo': contacts.filter(c => c.estatus === 'Nuevo').length,
      'Contactado': contacts.filter(c => c.estatus === 'Contactado').length,
      'En seguimiento': contacts.filter(c => c.estatus === 'En seguimiento').length,
      'Propuesta': contacts.filter(c => c.estatus === 'Propuesta enviada').length,
      'Ganado': contacts.filter(c => c.estatus === 'Ganado').length
    };
    document.getElementById('pipeline').innerHTML = Object.entries(pipeline).map(([stage, count]) => `
      <div class="pipeline-card">
        <h3>${stage}</h3>
        <div class="count">${count}</div>
      </div>
    `).join('');
  }

  function exportCSV() {
    const csv = [
      ['Empresa', 'Ubicación', 'Nombre', 'Cargo', 'Email', 'Teléfono', 'Estatus', 'Prioridad'],
      ...contacts.map(c => [c.empresa, c.ubicacion, c.nombre, c.cargo, c.email, c.telefono, c.estatus, c.prioridad])
    ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nexus-v2-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
  }

  document.getElementById('searchInput').addEventListener('input', renderTable);
  load();
</script>

</body>
</html>
